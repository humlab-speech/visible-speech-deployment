# mod_remoteip — resolve real visitor IP from X-Forwarded-For
#
# When Apache sits behind a reverse proxy (nginx in prod, Traefik in dev),
# REMOTE_ADDR is the proxy's internal IP (e.g. 10.89.0.x on the Podman
# network). This module replaces REMOTE_ADDR with the real client IP
# extracted from the forwarded-for header.
#
# This is critical for Matomo analytics: without it, all visitors appear
# to come from internal container IPs instead of their real public IPs.

# Production (nginx): uses X-Forwarded-For
# Dev (Traefik v3): uses X-Real-Ip
# We configure both — Apache uses the first header it finds.
RemoteIPHeader X-Forwarded-For

# Trust proxies on the Podman visp-net network (10.89.0.0/24)
RemoteIPInternalProxy 10.89.0.0/16

# Trust localhost (e.g. Traefik on the same host)
RemoteIPInternalProxy 127.0.0.0/8

# Trust Docker/Podman default bridge networks
RemoteIPInternalProxy 172.16.0.0/12
