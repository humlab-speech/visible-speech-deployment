# mod_remoteip — resolve real visitor IP from X-Forwarded-For
#
# When Apache sits behind a reverse proxy (nginx in prod), REMOTE_ADDR is
# the proxy's internal IP (e.g. 10.89.0.x on the Podman network). This
# module replaces REMOTE_ADDR with the real client IP extracted from the
# forwarded-for header.
#
# This is critical for Matomo analytics: without it, all visitors appear
# to come from internal container IPs instead of their real public IPs.

RemoteIPHeader X-Forwarded-For

# Trust all RFC 1918 private networks — covers:
#   10.0.0.0/8     — university load balancers + Podman visp-net
#   172.16.0.0/12  — Docker/Podman bridge networks
#   192.168.0.0/16 — common local networks
# These are never real client IPs, so mod_remoteip will strip them
# from X-Forwarded-For and keep peeling back to the real public IP.
RemoteIPInternalProxy 10.0.0.0/8
RemoteIPInternalProxy 172.16.0.0/12
RemoteIPInternalProxy 192.168.0.0/16

# Trust localhost
RemoteIPInternalProxy 127.0.0.0/8
