<VirtualHost *:80>
  ServerName arctic.${BASE_DOMAIN}

  RequestHeader set X-Forwarded-Proto https
  ProxyPreserveHost On
  Timeout 28800
  ProxyTimeout 28800

  # Matomo analytics — serve tracker JS and proxy collection endpoint
  # Uses obfuscated paths (/vt, /vt.js) to avoid ad-blocker filter lists
  Alias /vc.js /var/www/html/vc.js
  ProxyPass /vc.js !
  ProxyPass        /vt.js  http://matomo/matomo.js
  ProxyPassReverse /vt.js  http://matomo/matomo.js
  ProxyPass        /vt     http://matomo/matomo.php
  ProxyPassReverse /vt     http://matomo/matomo.php

  # arctic proxy (VirtualHost-level so Matomo exclusions take precedence)
  ProxyPass         /file  http://emu-webapp-server:17890/file
  ProxyPassReverse  /file  http://emu-webapp-server:17890/file
  ProxyPass         /      http://arctic/
  ProxyPassReverse  /      http://arctic/

  <Location "/">
    Header unset x-frame-options
    Header unset Content-Security-Policy

    # WebSocket upgrade to emu-webapp-server
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteRule ^/?(.*)$ ws://emu-webapp-server:17890/$1 [P,L,QSA]

    # Inject Matomo tracker script into HTML responses from arctic backend
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</head>|<script src='/vc.js' defer></script></head>|ni"
  </Location>

  <Proxy ws://arctic:80/>
    ProxySet timeout=28800
  </Proxy>

  ServerAdmin support@humlab.umu.se

  ErrorLog ${APACHE_LOG_DIR}/arctic-error.log
  CustomLog ${APACHE_LOG_DIR}/arctic-access.log combined

</VirtualHost>
