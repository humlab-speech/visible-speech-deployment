<VirtualHost *:80>
  ServerName idp.${BASE_DOMAIN}

  Header set Access-Control-Allow-Origin "*"
  RequestHeader set X-Forwarded-Proto "https"

  ProxyPreserveHost On
  SSLProxyEngine On
  SSLProxyVerify none
  SSLProxyCheckPeerName off
  SSLProxyCheckPeerCN off
  SSLProxyCheckPeerExpire off

  ProxyPass / https://local-idp/
  ProxyPassReverse / https://local-idp/

  ServerAdmin support@humlab.umu.se

  ErrorLog ${APACHE_LOG_DIR}/idp-error.log
  CustomLog ${APACHE_LOG_DIR}/idp-access.log combined

</VirtualHost>
