<VirtualHost *:80>
  ServerName octra.${BASE_DOMAIN}

  RequestHeader set X-Forwarded-Proto "https"

  # Map /api to the webclient-bundled api directory (/var/www/html/api).
  # This is the single source of truth for api.php, with all handlers
  # including file download (getOctraTask, getFileDownload).
  Alias /api /var/www/html/api

  # Top-level rewrite rule (before fallback to index.php)
  # This is so that octra can call on /api/ urls and reach the PHP API
  RewriteEngine On
  RewriteRule ^/api/v1/(.*)$ /api/api.php [L]

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}e"
  RequestHeader set X-Forwarded-Proto "https"

  # Matomo analytics — serve tracker JS and proxy collection endpoint
  # Uses obfuscated paths (/vt, /vt.js) to avoid ad-blocker filter lists
  Alias /vc.js /var/www/html/vc.js
  ProxyPass /vc.js !
  ProxyPass        /vt.js  http://matomo/matomo.js
  ProxyPassReverse /vt.js  http://matomo/matomo.js
  ProxyPass        /vt     http://matomo/matomo.php
  ProxyPassReverse /vt     http://matomo/matomo.php

  # Exclude /api from proxying — handled locally by Alias + RewriteRule above
  ProxyPass /api !
  ProxyPass / http://octra/
  ProxyPassReverse / http://octra.${BASE_DOMAIN}

  # Inject Matomo tracker script into HTML responses from OCTRA backend
  <Location "/">
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</head>|<script src='/vc.js' defer></script></head>|ni"
  </Location>

  # Use RewriteEngine to handle websocket connection upgrades
  RewriteCond %{HTTP:Connection} Upgrade [NC]
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteRule /(.*) ws://octra/$1 [P,L]

  ServerAdmin support@humlab.umu.se

  ErrorLog ${APACHE_LOG_DIR}/octra-error.log
  CustomLog ${APACHE_LOG_DIR}/octra-access.log combined

</VirtualHost>
