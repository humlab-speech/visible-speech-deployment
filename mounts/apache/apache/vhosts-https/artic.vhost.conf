#Port 80 will never be hit while the master-edge-router is being used since it automatically forwards all traffic to port 8081 which goes directly to 443
<VirtualHost *:80>
  ServerName artic.${BASE_DOMAIN}

  RewriteEngine On
  RewriteCond %{HTTPS} off
  RewriteCond %{REQUEST_URI} !^\/\.well-known\/.*$
  RewriteRule (.*) https://artic.${BASE_DOMAIN}/$1 [R,L]

</VirtualHost>

<VirtualHost *:443>

  ServerName artic.${BASE_DOMAIN}

  SSLProtocol All -SSLv2 -SSLv3
  SSLCompression Off
  SSLCipherSuite "EECDH+ECDSA+AESGCM EECDH+aRSA+AESGCM EECDH+ECDSA+SHA384 EECDH+ECDSA+SHA256 EECDH+aRSA+SHA384 EECDH+aRSA+SHA256 EECDH+AESGCM EECDH EDH+AESGCM EDH+aRSA HIGH !MEDIUM !LOW !aNULL !eNULL !L$
  SSLEngine On
  SSLProxyEngine On

  SSLCertificateFile /etc/certs/${BASE_DOMAIN}/cert.crt
  SSLCertificateKeyFile /etc/certs/${BASE_DOMAIN}/cert.key

  #SSLCertificateFile /certs/letsencrypt/live/${BASE_DOMAIN}/fullchain.pem
  #SSLCertificateKeyFile /certs/letsencrypt/live/${BASE_DOMAIN}/privkey.pem

  RequestHeader set X-Forwarded-Proto "https"
  ProxyPreserveHost On
  Timeout 28800
  ProxyTimeout 28800

  # Matomo analytics
  Alias /vc.js /var/www/html/vc.js
  ProxyPass /vc.js !
  ProxyPass        /vt.js  http://matomo/matomo.js
  ProxyPassReverse /vt.js  http://matomo/matomo.js
  ProxyPass        /vt     http://matomo/matomo.php
  ProxyPassReverse /vt     http://matomo/matomo.php

  # artic proxy (VirtualHost-level so Matomo exclusions take precedence)
  ProxyPass         /file  http://emu-webapp-server:17890/file
  ProxyPassReverse  /file  http://emu-webapp-server:17890/file
  ProxyPass         /      http://artic/
  ProxyPassReverse  /      http://artic/

  <Location "/">
    Header unset x-frame-options
    Header unset Content-Security-Policy

    # WebSocket upgrade to emu-webapp-server
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteRule ^/?(.*)$ ws://emu-webapp-server:17890/$1 [P,L,QSA]

    # Inject Matomo tracker script into HTML responses from artic backend
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</head>|<script src='/vc.js' defer></script></head>|ni"
  </Location>

  ServerAdmin support@humlab.umu.se

  ErrorLog ${APACHE_LOG_DIR}/artic-error.log
  CustomLog ${APACHE_LOG_DIR}/artic-access.log combined

</VirtualHost>
