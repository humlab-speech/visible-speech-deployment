# HTTP → HTTPS redirect (except ACME challenges)
<VirtualHost *:80>
  ServerName ${BASE_DOMAIN}

  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/
  RewriteCond %{REQUEST_URI} !^/api/
  RewriteRule (.*) https://${BASE_DOMAIN}/$1 [R=301,L]

  ServerAdmin support@humlab.umu.se
  ErrorLog ${APACHE_LOG_DIR}/${BASE_DOMAIN}-error.log
  CustomLog ${APACHE_LOG_DIR}/${BASE_DOMAIN}-access.log combined
</VirtualHost>

<VirtualHost *:443>
  # NOTE: ServerName includes https:// protocol and :443 port deliberately.
  # This configuration is required for the system to work correctly in both
  # local development and production environments with load balancers.
  # DO NOT change this to just ${BASE_DOMAIN} despite Apache warnings.
  ServerName https://${BASE_DOMAIN}:443
  ServerAlias apache
  ServerAlias edge-router
  UseCanonicalName On
  DirectoryIndex index.php

  SSLEngine On
  SSLProxyEngine On
  SSLProtocol All -SSLv2 -SSLv3
  SSLCompression Off
  SSLCipherSuite "EECDH+ECDSA+AESGCM EECDH+aRSA+AESGCM EECDH+ECDSA+SHA384 EECDH+ECDSA+SHA256 EECDH+aRSA+SHA384 EECDH+aRSA+SHA256 EECDH+AESGCM EECDH EDH+AESGCM EDH+aRSA HIGH !MEDIUM !LOW !aNULL !eNULL !LOW !EXP !PSK !SRP !DSS"

  SSLCertificateFile /etc/certs/${BASE_DOMAIN}/cert.crt
  SSLCertificateKeyFile /etc/certs/${BASE_DOMAIN}/cert.key

  #SSLCertificateFile /certs/letsencrypt/live/${BASE_DOMAIN}/fullchain.pem
  #SSLCertificateKeyFile /certs/letsencrypt/live/${BASE_DOMAIN}/privkey.pem

  Header set Access-Control-Allow-Origin "*"

  # WebSocket proxying to session-manager
  RewriteEngine On
  RewriteCond %{HTTP:Connection} Upgrade [NC]
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteRule /(.*) ws://session-manager:8020/$1 [P,L]

  <Location /DS/Login>
    AuthType shibboleth
    ShibRequestSetting requireSession 1
    Require valid-user
    ShibUseEnvironment On
    ShibUseHeaders Off
  </Location>

  <Location /SAML2>
    AuthType shibboleth
    ShibRequestSetting requireSession 0
    Require shibboleth
    ShibUseEnvironment On
    ShibUseHeaders Off
  </Location>

  <Location /SLO>
    AuthType shibboleth
    ShibRequestSetting requireSession 0
    Require shibboleth
    ShibUseEnvironment On
    ShibUseHeaders Off
  </Location>

  <Location /Artifact>
    AuthType shibboleth
    ShibRequestSetting requireSession 0
    Require shibboleth
    ShibUseEnvironment On
    ShibUseHeaders Off
  </Location>

  <Directory /var/www/html>
    Options -Indexes

    <Files "index.php">
      AuthType shibboleth
      ShibRequestSetting requireSession 0
      Require shibboleth
      ShibUseEnvironment On
      ShibUseHeaders Off
    </Files>
  </Directory>

  <Location /spr/api/v1>
    RequestHeader set X-Forwarded-Proto https
    ProxyPreserveHost On
    ProxyPass         http://wsrng-server:8080
    ProxyPassReverse  http://wsrng-server:8080
  </Location>

  # Map /api to the webclient api directory
  Alias /api /var/www/html/api
  RewriteRule ^/api/v1/(.*)$ /api/api.php [L]

  <Directory /var/www/html/api>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
  </Directory>

  # Matomo tracking proxy
  ProxyPass        /vt.js  http://matomo/matomo.js
  ProxyPassReverse /vt.js  http://matomo/matomo.js
  ProxyPass        /vt     http://matomo/matomo.php
  ProxyPassReverse /vt     http://matomo/matomo.php

  <Location />
    RewriteEngine On
    RewriteBase /
    RewriteCond expr "! %{HTTP:Upgrade} -strmatch 'websocket'" [NC]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/Shibboleth
    RewriteCond %{REQUEST_URI} !^/SAML2
    RewriteCond %{REQUEST_URI} !^/SLO
    RewriteCond %{REQUEST_URI} !^/Artifact
    RewriteCond %{REQUEST_URI} !^/Metadata
    RewriteCond %{REQUEST_URI} !^/Status
    RewriteCond %{REQUEST_URI} !^/Session
    RewriteCond %{REQUEST_URI} !^/DiscoFeed
    RewriteCond %{REQUEST_URI} !^/Logout
    RewriteCond %{REQUEST_URI} !^/spr/api
    RewriteCond %{REQUEST_URI} !^/vt(\.js)?$
    RewriteRule . /index.php [L]
  </Location>

  ServerAdmin support@humlab.umu.se

  LogLevel info

  ErrorLog ${APACHE_LOG_DIR}/${BASE_DOMAIN}-error.log
  CustomLog ${APACHE_LOG_DIR}/${BASE_DOMAIN}-access.log combined

</VirtualHost>
