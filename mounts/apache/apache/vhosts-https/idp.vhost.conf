<VirtualHost *:80>
  ServerName idp.${BASE_DOMAIN}

  RewriteEngine On
  RewriteRule (.*) https://idp.${BASE_DOMAIN}/$1 [R=301,L]

  ServerAdmin support@humlab.umu.se
  ErrorLog ${APACHE_LOG_DIR}/idp-error.log
  CustomLog ${APACHE_LOG_DIR}/idp-access.log combined
</VirtualHost>

<VirtualHost *:443>
  ServerName idp.${BASE_DOMAIN}

  SSLEngine On
  SSLProxyEngine On
  SSLProtocol All -SSLv2 -SSLv3
  SSLCertificateFile /etc/certs/${BASE_DOMAIN}/cert.crt
  SSLCertificateKeyFile /etc/certs/${BASE_DOMAIN}/cert.key

  # Disable cert checking for internal proxy to local-idp
  SSLProxyVerify none
  SSLProxyCheckPeerName off
  SSLProxyCheckPeerCN off
  SSLProxyCheckPeerExpire off

  Header set Access-Control-Allow-Origin "*"
  RequestHeader set X-Forwarded-Proto "https"

  ProxyPreserveHost On
  ProxyPass / https://local-idp/
  ProxyPassReverse / https://local-idp/

  ServerAdmin support@humlab.umu.se
  ErrorLog ${APACHE_LOG_DIR}/idp-error.log
  CustomLog ${APACHE_LOG_DIR}/idp-access.log combined
</VirtualHost>
