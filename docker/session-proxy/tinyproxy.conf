# Tinyproxy config for VISP session outgoing proxy
# This runs as a sidecar to --network=none Jupyter/RStudio sessions,
# providing filtered internet access for pip/conda/CRAN installs.

Port 8888
Listen 127.0.0.1
# Short timeout so that nftables-dropped connections fail fast instead of
# holding the client (wget/pip/curl) open for minutes waiting for a remote
# that will never respond.
Timeout 15
MaxClients 50

# Only accept connections from localhost (socat bridge)
Allow 127.0.0.1

# Restrict CONNECT (HTTPS tunneling) to standard ports
ConnectPort 443
ConnectPort 80

# Logging to stdout for container visibility
# Levels: Critical, Error, Warning, Notice, Connect, Info
# "Connect" logs each CONNECT/request with destination host
LogFile "/dev/stdout"
LogLevel Connect

# Minimal headers - don't reveal proxy details
DisableViaHeader Yes

# URL filter — block access to private/internal networks.
# The filter file is generated at startup by entrypoint.sh from:
#   1. Hardcoded RFC 1918 + link-local ranges (always blocked)
#   2. PROXY_BLOCKED_NETWORKS env var (optional, space-separated regex patterns)
Filter "/tmp/proxy-filter.txt"
FilterURLs Off
FilterExtended On
FilterCaseSensitive Off
FilterDefaultDeny No

# PID file in writable location
PidFile "/tmp/tinyproxy.pid"
